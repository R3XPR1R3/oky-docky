# Pi hot-reload override
# Used together with docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.pi.yml up -d
#
# Backend: source mounted as volume, uvicorn --reload detects changes
# Frontend: nginx serves from a shared volume; frontend-builder rebuilds dist on demand

services:
  backend:
    volumes:
      - ./actual/back:/app/actual/back
      - ./.git:/app/.git
    command:
      [
        "python3", "-m", "uvicorn",
        "actual.back.fillable_processor:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--reload",
        "--reload-dir", "/app/actual/back"
      ]

  frontend:
    volumes:
      - frontend-dist:/usr/share/nginx/html
      - ./actual/front/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  frontend-builder:
    build:
      context: ./actual
      dockerfile: front/Dockerfile
      target: build
      args:
        VITE_ADSENSE_CLIENT: ${VITE_ADSENSE_CLIENT:-ca-pub-8314082563234213}
        VITE_ADSENSE_SLOT: ${VITE_ADSENSE_SLOT:-1815198011}
    volumes:
      - ./actual/front/src:/app/front/src
      - ./actual/front/index.html:/app/front/index.html
      - ./actual/front/vite.config.ts:/app/front/vite.config.ts
      - ./actual/front/postcss.config.mjs:/app/front/postcss.config.mjs
      - ./actual/back/data/templates:/app/back/data/templates:ro
      - frontend-dist:/output
    # The image build already runs Vite. Copy its finished dist instead of
    # compiling a second time inside the one-shot container.
    command: ["sh", "-c", "rm -rf /output/oky-docky && mkdir -p /output/oky-docky && cp -r dist/. /output/oky-docky/"]
    profiles: ["build"]

volumes:
  frontend-dist:
