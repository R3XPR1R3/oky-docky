# Pi hot-reload override
# Used together with docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.pi.yml up -d
#
# Backend: source mounted as volume, uvicorn --reload detects changes
# Frontend: nginx serves from a shared volume; frontend-builder rebuilds dist on demand

services:
  backend:
    volumes:
      - ./actual/back:/app/actual/back
    command:
      [
        "python3", "-m", "uvicorn",
        "actual.back.fillable_processor:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--reload",
        "--reload-dir", "/app/actual/back"
      ]

  frontend:
    volumes:
      - frontend-dist:/usr/share/nginx/html
      - ./actual/front/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  frontend-builder:
    build:
      context: ./actual/front
      dockerfile: Dockerfile
      target: build
    volumes:
      - ./actual/front/src:/app/src
      - ./actual/front/index.html:/app/index.html
      - ./actual/front/vite.config.ts:/app/vite.config.ts
      - ./actual/front/postcss.config.mjs:/app/postcss.config.mjs
      - frontend-dist:/output
    command: ["sh", "-c", "npm run build && rm -rf /output/* && cp -r dist/* /output/"]
    profiles: ["build"]

volumes:
  frontend-dist:
