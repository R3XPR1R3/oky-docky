services:
  backend:
    build:
      context: ./actual
      dockerfile: back/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SITE_URL: ${PUBLIC_URL:-https://barckhat.com/oky-docky/}
      ANALYTICS_DB_PATH: /app_root/data/analytics.sqlite3
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-1}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    volumes:
      - backend-data:/app_root/data

  frontend:
    build:
      context: ./actual
      dockerfile: front/Dockerfile
      args:
        VITE_ADSENSE_CLIENT: ${VITE_ADSENSE_CLIENT:-ca-pub-8314082563234213}
        VITE_ADSENSE_SLOT: ${VITE_ADSENSE_SLOT:-1815198011}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # Share the frontend network namespace. A remotely configured tunnel
    # origin such as http://localhost:80 then reaches nginx directly, including
    # on Docker Desktop where host networking may be unavailable.
    network_mode: "service:frontend"
    depends_on:
      - frontend
    command:
      [
        "tunnel",
        "--no-autoupdate",
        "--protocol",
        "http2",
        "--url",
        "http://localhost:80",
        "run",
        "--token",
        "${TUNNEL_TOKEN:?Set TUNNEL_TOKEN in .env or environment to start the named Cloudflare tunnel}"
      ]
    profiles:
      - tunnel

volumes:
  backend-data:
