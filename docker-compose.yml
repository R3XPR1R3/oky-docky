services:
  backend:
    build:
      context: ./actual
      dockerfile: back/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app_root/data

  frontend:
    build:
      context: ./actual/front
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # The named tunnel is configured in Cloudflare to reach the local origin.
    # Use host networking so origin URLs like http://localhost:80 resolve to
    # the host-published frontend port instead of the cloudflared container.
    network_mode: host
    depends_on:
      - frontend
    command:
      [
        "tunnel",
        "--no-autoupdate",
        "run",
        "--token",
        "${TUNNEL_TOKEN:?Set TUNNEL_TOKEN in .env or environment to start the named Cloudflare tunnel}"
      ]
    profiles:
      - tunnel

volumes:
  backend-data:
