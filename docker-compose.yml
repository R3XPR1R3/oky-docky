services:
  backend:
    build:
      context: ./actual
      dockerfile: back/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app_root/data

  frontend:
    build:
      context: ./actual/front
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-data:
