server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SEO: sitemap and robots served by backend
    location = /sitemap.xml {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location = /oky-docky/sitemap.xml {
        proxy_pass http://backend:8000/sitemap.xml;
        proxy_set_header Host $host;
    }

    location = /robots.txt {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }


    # Ensure modern JS modules are served with a JavaScript MIME type
    # (required for pdf.js worker .mjs loading via strict browser checks).
    location ~* \.mjs$ {
        types { application/javascript mjs; }
        default_type application/javascript;
        try_files $uri =404;
    }

    # Hashed assets — cache aggressively (Vite adds content hash to filenames)
    location /oky-docky/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — never cache (it references hashed assets)
    location = /oky-docky/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # SPA fallback — serve index.html for all non-file routes
    location = /oky-docky {
        return 301 /oky-docky/;
    }

    location /oky-docky/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
        try_files $uri $uri/ /oky-docky/index.html;
    }

    location / {
        return 404;
    }
}
